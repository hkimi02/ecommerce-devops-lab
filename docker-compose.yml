services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - appnet

  app:
    build: ./app
    container_name: app
    restart: always
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - PORT=3000
    depends_on:
      - mongo
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

volumes:
  mongo-data:

networks:
  appnet:
    driver: bridge
