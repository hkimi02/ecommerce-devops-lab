name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ===========================================================
  # 1. TERRAFORM - provision AWS infrastructure
  # ===========================================================
  terraform:
    name: Provision Infrastructure
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export instance IPs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r 'join(",")')
          echo "instance_ips=$IPS" >> "$GITHUB_OUTPUT"
          echo "Provisioned instances: $IPS"
          terraform output -raw alb_dns_name

  # ===========================================================
  # 2. ANSIBLE - configure servers and deploy the app
  # ===========================================================
  ansible:
    name: Configure Servers
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: terraform
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible jq

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate inventory from Terraform outputs
        run: |
          echo "[web]" > inventory.ini
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "$ip ansible_user=ubuntu ansible_ssh_private_key_file=${{ github.workspace }}/key.pem" >> inventory.ini
          done
          cat inventory.ini

      - name: Wait for SSH to become available
        run: |
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "Waiting for SSH on $ip ..."
            for i in $(seq 1 30); do
              if nc -z -w5 "$ip" 22; then echo "$ip is up"; break; fi
              sleep 10
            done
          done

      - name: Run Ansible deployment
        run: ansible-playbook -i inventory.ini ansible/deploy.yml

  # ===========================================================
  # 3. DESTROY - manual teardown (Actions tab -> Run workflow)
  # ===========================================================
  destroy:
    name: Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
